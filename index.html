<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domke.com - Laboratorio de Imágenes Total</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --text-color: #cdd6f4;
            --primary: #cba6f7;
            --success: #a6e3a1;
            --surface: #313244;
            --accent: #fab387;
            --border: #45475a;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        header { margin-bottom: 20px; text-align: center; }
        header h1 { color: var(--primary); font-size: 3rem; margin: 0; }
        header p { color: var(--accent); font-style: italic; margin-top: 5px;}

        /* Zona de Carga */
        .container {
            background-color: var(--surface);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
            max-width: 900px;
            width: 100%;
            text-align: center;
            border: 2px dashed var(--border);
            transition: border 0.3s;
            box-sizing: border-box;
        }
        .container.dragover { border-color: var(--primary); background: #3c3e52; }

        #file-input { display: none; }
        .upload-label {
            background-color: var(--primary);
            color: var(--bg-color);
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 15px;
        }

        /* Panel de Controles Globales */
        #global-controls {
            margin-top: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            box-sizing: border-box;
        }
        .control-group {
            border: 1px solid var(--border);
            padding: 10px;
            border-radius: 8px;
            text-align: left;
            min-width: 200px;
        }
        .control-group h4 { margin: 0 0 10px 0; color: var(--accent); }
        .control-group label { display: block; font-size: 14px; margin-bottom: 5px; }
        select, input[type="range"], input[type="color"] {
            width: 100%;
            background: var(--bg-color);
            color: var(--text-color);
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 5px;
            box-sizing: border-box;
        }

        /* Zona de Resultados */
        #preview-area {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
            width: 100%;
            max-width: 1000px;
        }
        .img-card {
            background: var(--surface);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .img-card img {
            max-width: 100%;
            border-radius: 8px;
            height: 150px;
            object-fit: contain;
            background-image: repeating-conic-gradient(#313244 0% 25%, #45475a 0% 50%); /* Fondo ajedrez para transparencia */
            background-size: 20px 20px;
        }
        .img-card p { font-size: 12px; margin: 10px 0; overflow: hidden; text-overflow: ellipsis; }
        .download-btn {
            background: var(--success);
            color: var(--bg-color);
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
        }
        .clear-btn {
            background: #f38ba8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 20px;
            cursor: pointer;
        }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <header>
        <h1>Domke.com</h1>
        <p>Laboratorio de Imágenes Total - Transforma, Edita y Comprime</p>
    </header>

    <div class="container" id="drop-zone">
        <p>Arrastra tus imágenes aquí o</p>
        <label for="file-input" class="upload-label">Seleccionar archivos</label>
        <input type="file" id="file-input" accept="image/*" multiple>
        
        <div id="global-controls">
            
            <div class="control-group">
                <h4>1. Tamaño (Comprimir)</h4>
                <select id="resize-preset">
                    <option value="1">Original (100%)</option>
                    <option value="0.75">Mediano (75%)</option>
                    <option value="0.5">Pequeño (50% - Ligero)</option>
                    <option value="0.25">Miniatura (25%)</option>
                    <option value="hd">Ajustar a HD (720p)</option>
                    <option value="square">Cuadrado Perfil (500x500)</option>
                </select>
                <p style="font-size: 11px; color: #a6adc8; margin: 5px 0 0 0;">Reducir tamaño comprime el peso del archivo.</p>
            </div>

            <div class="control-group">
                <h4>2. Filtros Estéticos</h4>
                <label><input type="checkbox" id="filter-grayscale"> Escala de Grises</label>
                <label><input type="checkbox" id="filter-sepia"> Sepia</label>
                <label><input type="checkbox" id="filter-invert"> Invertir Colores</label>
                <label>Brillo: <input type="range" id="filter-brightness" min="-100" max="100" value="0"></label>
            </div>

            <div class="control-group">
                <h4>3. Borrar Fondo (PNG)</h4>
                <label>Color a hacer transparente:</label>
                <input type="color" id="chroma-color" value="#ffffff">
                <label>Tolerancia (fuerza):</label>
                <input type="range" id="chroma-tolerance" min="0" max="100" value="20">
                <label><input type="checkbox" id="chroma-active"> Activar Borrador</label>
            </div>

        </div>
    </div>

    <div id="preview-area"></div>
    
    <button id="clear-all" class="clear-btn hidden">Limpiar todo</button>

    <canvas id="processing-canvas" style="display:none;"></canvas>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const previewArea = document.getElementById('preview-area');
        const clearBtn = document.getElementById('clear-all');
        const canvas = document.getElementById('processing-canvas');
        const ctx = canvas.getContext('2d');

        // Controles globales
        const resizePreset = document.getElementById('resize-preset');
        const fGray = document.getElementById('filter-grayscale');
        const fSepia = document.getElementById('filter-sepia');
        const fInvert = document.getElementById('filter-invert');
        const fBrightness = document.getElementById('filter-brightness');
        const chromaActive = document.getElementById('chroma-active');
        const chromaColor = document.getElementById('chroma-color');
        const chromaTolerance = document.getElementById('chroma-tolerance');

        // Manejo de Arrastrar y Soltar (Mismo de antes)
        ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, preventDefaults, false);
        });
        function preventDefaults(e) { e.preventDefault(); e.stopPropagation(); }
        ['dragenter', 'dragover'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.add('dragover'), false);
        });
        ['dragleave', 'drop'].forEach(eventName => {
            dropZone.addEventListener(eventName, () => dropZone.classList.remove('dragover'), false);
        });
        dropZone.addEventListener('drop', (e) => handleFiles(e.dataTransfer.files));
        fileInput.addEventListener('change', (e) => handleFiles(e.target.files));

        function handleFiles(files) {
            const fileList = Array.from(files);
            if (fileList.length > 0) clearBtn.classList.remove('hidden');
            fileList.forEach(file => {
                if (!file.type.startsWith('image/')) return;
                processImage(file);
            });
        }

        // --- EL MOTOR DE DOMKE (Procesamiento completo) ---
        function processImage(file) {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                
                img.onload = () => {
                    // 1. Calcular Redimensionado (Compresión)
                    let targetWidth = img.width;
                    let targetHeight = img.height;
                    const preset = resizePreset.value;

                    if (preset === 'hd') {
                        const ratio = 1280 / img.width;
                        if(ratio < 1) { targetWidth = 1280; targetHeight = img.height * ratio; }
                    } else if (preset === 'square') {
                        targetWidth = 500; targetHeight = 500;
                    } else {
                        const scale = parseFloat(preset);
                        targetWidth = img.width * scale;
                        targetHeight = img.height * scale;
                    }

                    // Configurar Canvas
                    canvas.width = targetWidth;
                    canvas.height = targetHeight;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    
                    // 2. Aplicar Filtros Estéticos (antes de dibujar)
                    let filters = [];
                    if (fGray.checked) filters.push('grayscale(100%)');
                    if (fSepia.checked) filters.push('sepia(100%)');
                    if (fInvert.checked) filters.push('invert(100%)');
                    if (fBrightness.value !== "0") filters.push(`brightness(${100 + parseInt(fBrightness.value)}%)`);
                    
                    ctx.filter = filters.join(' ');
                    
                    // Dibujar imagen (redimensionada y con filtros aplicados)
                    if (preset === 'square') {
                        // Recorte centrado para cuadrado
                        const minDim = Math.min(img.width, img.height);
                        const sx = (img.width - minDim) / 2;
                        const sy = (img.height - minDim) / 2;
                        ctx.drawImage(img, sx, sy, minDim, minDim, 0, 0, 500, 500);
                    } else {
                        ctx.drawImage(img, 0, 0, targetWidth, targetHeight);
                    }
                    
                    // Resetear filtros
                    ctx.filter = 'none';

                    // 3. Aplicar Borrador de Fondo (Croma) - Manipulación de píxeles
                    if (chromaActive.checked) {
                        removeBackgroundColor();
                    }
                    
                    // 4. Convertir a PNG (DataURL)
                    const pngData = canvas.toDataURL('image/png');
                    
                    // Crear tarjeta
                    createPreviewCard(file.name, pngData, targetWidth, targetHeight);
                };
            };
        }

        // Función para borrar el color de fondo
        function removeBackgroundColor() {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data; // Array [r, g, b, a, r, g, b, a, ...]
            
            // Convertir color HEX a RGB
            const hex = chromaColor.value;
            const rTarget = parseInt(hex.slice(1, 3), 16);
            const gTarget = parseInt(hex.slice(3, 5), 16);
            const bTarget = parseInt(hex.slice(5, 7), 16);
            const tolerance = chromaTolerance.value * 2.55; // Escala 0-100 a 0-255

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i];
                const g = data[i+1];
                const b = data[i+2];
                
                // Calcular "distancia" de color
                const distance = Math.sqrt(
                    Math.pow(r - rTarget, 2) +
                    Math.pow(g - gTarget, 2) +
                    Math.pow(b - bTarget, 2)
                );
                
                if (distance < tolerance) {
                    data[i+3] = 0; // Hacer Alfa transparent
                }
            }
            // Poner los píxeles modificados de vuelta en el canvas
            ctx.putImageData(imageData, 0, 0);
        }

        function createPreviewCard(originalName, pngData, w, h) {
            const card = document.createElement('div');
            card.className = 'img-card';
            
            const nameArr = originalName.split('.');
            nameArr.pop(); // Quitar extensión antigua
            const newName = nameArr.join('.') + '_Domke.png';
            
            card.innerHTML = `
                <img src="${pngData}">
                <p title="${newName}">${newName}<br>(${Math.round(w)}x${Math.round(h)}px)</p>
                <button class="download-btn" onclick="downloadImage('${pngData}', '${newName}')">Descargar PNG</button>
            `;
            
            previewArea.appendChild(card);
        }

        function downloadImage(data, name) {
            const link = document.createElement('a');
            link.href = data;
            link.download = name;
            link.click();
        }

        clearBtn.addEventListener('click', () => {
            previewArea.innerHTML = '';
            clearBtn.classList.add('hidden');
            fileInput.value = '';
        });
    </script>
</body>
</html>
